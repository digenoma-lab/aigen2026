<div class="section-heading">
  <p class="eyebrow">{{ site.Params.institutionsEyebrow }}</p>
  <h2>{{ site.Params.institutionsTitle }}</h2>
</div>
<div class="logo-strip" role="list" aria-label="{{ site.Params.institutionsAriaLabel }}">
  {{ range site.Params.institutions }}
    <article class="logo-strip__item" role="listitem">
      {{ if .url }}
        <a class="logo-strip__link" href="{{ .url }}" target="_blank" rel="noreferrer" aria-label="{{ .name }}">
          <img src="{{ .image }}" alt="{{ .alt }}" loading="lazy">
          <p>{{ .name }}</p>
        </a>
      {{ else }}
        <div class="logo-strip__link" aria-label="{{ .name }}">
          <img src="{{ .image }}" alt="{{ .alt }}" loading="lazy">
          <p>{{ .name }}</p>
        </div>
      {{ end }}
    </article>
  {{ end }}
</div>
