<nav class="site-nav" aria-label="Navegación principal">
  <ul>
    {{ range site.Menus.main }}
      {{ $isCurrent := or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) (eq $.RelPermalink .URL) }}
      <li>
        <a href="{{ .URL }}" {{ if $isCurrent }}aria-current="page"{{ end }}>{{ .Name }}</a>
      </li>
    {{ end }}
  </ul>
</nav>
